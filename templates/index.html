<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIT-30 Yapay Zeka Asistanı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="chat-app">
  <div class="chat-header">
    <div class="avatar">H30</div>
    <div class="header-text">
      <div class="header-title">HIT-30 Yatırım Asistanı</div>
      <div class="header-status"><span class="status-dot"></span> Çevrimiçi • Destek Ofisi</div>
    </div>
    <div class="header-icon">⚡</div>
  </div>

  <div class="chat-body" id="chatBody"></div>

  <div class="chat-input-wrap">
    <div class="chat-input-bar">
      <input type="text" id="userInput" placeholder="Sorunuzu yazın..." autocomplete="off">
      <button class="send-btn" id="sendBtn" aria-label="Gönder">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="footer-note">T.C. Sanayi ve Teknoloji Bakanlığı · HIT-30 Programı</div>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
